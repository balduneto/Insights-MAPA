<!DOCTYPE html>

    <script>

                            <XAxis dataKey="mes" tick={{ fontSize: 12 }} />
                            <YAxis yAxisId="left" />
                            <YAxis yAxisId="right" orientation="right" tickFormatter={(v) => `${v}%`} />
                            <Tooltip />
                            <Legend />
                            <Bar yAxisId="left" dataKey="totalFq" name="Total Físico-Químico" fill="#93c5fd" radius={[4, 4, 0, 0]} />
                            <Line yAxisId="right" type="monotone" dataKey="perc" name="% de Água" stroke="#1d4ed8" strokeWidth={3} dot={{ r: 5, fill: '#1d4ed8' }}>
                              <LabelList dataKey="perc" position="top" formatter={(v) => `${v}%`} style={{ fill: '#1e3a8a', fontSize: '11px', fontWeight: 'bold' }} />
                            </Line>
                          </ComposedChart>
                        </ResponsiveContainer>
                      </div>
                    </div>
                  </div>
                )}

                {/* ABA 3: Gestão Financeira */}
                {activeTab === 'financeiro' && (
                  <div className="space-y-8 animate-in">
                    
                    <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                      <h2 className="text-xl font-bold text-gray-900 mb-2">Dicionário Básico: Estoque x Empenho</h2>
                      <div className="grid md:grid-cols-2 gap-6 mt-4">
                        <div className="flex gap-4">
                          <div className="w-1.5 bg-indigo-600 rounded-full"></div>
                          <div>
                            <h3 className="font-bold text-gray-800 text-lg">O que é "Valor em Estoque"?</h3>
                            <p className="text-sm text-gray-600 mt-2 leading-relaxed">É o dinheiro da empresa que está "parado" nas prateleiras em formato de reagentes, frascos e insumos laboratoriais. Precisamos desse estoque para o laboratório não parar, mas gerenciá-lo bem evita que o capital de giro fique imobilizado desnecessariamente.</p>
                          </div>
                        </div>
                        <div className="flex gap-4">
                          <div className="w-1.5 bg-pink-500 rounded-full"></div>
                          <div>
                            <h3 className="font-bold text-gray-800 text-lg">O que é "Valor Empenhado"?</h3>
                            <p className="text-sm text-gray-600 mt-2 leading-relaxed">É o orçamento que já está formalmente comprometido e reservado para compras futuras, pagamentos de projetos ou fornecedores em andamento.</p>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <Card title="Capital Imobilizado (Pico Abr/25)" value={FormatCurrency(394022.90)} subtitle="Alerta estratégico: Necessidade de otimização de estoque" icon={IconDollarSign} colorClass="bg-indigo-600" />
                      <Card title="Espaço Fiscal (Empenho Futuro)" value="Zerado" subtitle="Orçamento livre a partir de Jun/25 para novos investimentos (Capex)" icon={IconActivity} colorClass="bg-indigo-400" />
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl border border-gray-200 shadow-sm">
                      <div className="mb-6">
                        <h2 className="text-2xl font-bold text-gray-900">Histórico de Movimentação Financeira</h2>
                        <p className="text-gray-600 mt-2 mb-4">
                          Esta visualização, chamada de gráfico de áreas, ajuda a acompanhar como o capital de giro se move ao longo dos meses.
                        </p>
                        <div className="p-4 bg-indigo-50 rounded-xl text-sm text-indigo-900 border border-indigo-100 shadow-inner">
                          <strong>💡 Análise Didática:</strong> Note que a "montanha" azul clara (estoque) tem o seu ápice em Abril/25 (chegando a quase R$ 400 mil), o que sugere uma grande rodada de aquisição de insumos. Já a área rosa (dinheiro empenhado/comprometido) vinha contínua e, subitamente, foi zerada a partir de Junho. Isso indica que os projetos/compras anteriores foram quitados, liberando espaço orçamentário para novos investimentos — como a aquisição do equipamento sugerido na aba anterior.
                        </div>
                      </div>
                      
                      {/* Envolto min-w-0 adicionado */}
                      <div className="h-96 w-full min-w-0" style={{ position: 'relative' }}>
                        <ResponsiveContainer>
                          <AreaChart data={dataFinanceiro} margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" />
                            <XAxis dataKey="ref" stroke="#6b7280" tick={{ fontSize: 12 }} />
                            <YAxis stroke="#6b7280" tickFormatter={(value) => `R$ ${value / 1000}k`} />
                            <Tooltip formatter={(value) => FormatCurrency(value)} contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                            <Legend />
                            <Area type="monotone" dataKey="estoque" name="Valor em Estoque" stroke="#4f46e5" fill="#c7d2fe" strokeWidth={3} />
                            <Area type="monotone" dataKey="empenhado" name="Valor Empenhado" stroke="#ec4899" fill="#fbcfe8" strokeWidth={3} />
                          </AreaChart>
                        </ResponsiveContainer>
                      </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        }

        // Renderizando o App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
